<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метрики разработки | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .last-update {
            opacity: 0.9;
            font-size: 0.9em;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
        }
        
        .metric-title {
            font-size: 0.9em;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .metric-trend {
            font-size: 0.9em;
            color: #666;
        }
        
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .status-good { background: #d1fae5; color: #065f46; }
        .status-warning { background: #fed7aa; color: #92400e; }
        .status-critical { background: #fee2e2; color: #991b1b; }
        
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Метрики разработки</h1>
            <div class="last-update" id="lastUpdate">Загрузка данных...</div>
        </div>
        
        <div class="metrics-grid" id="keyMetrics">
            <!-- Ключевые метрики будут загружены сюда -->
        </div>
        
        <div class="two-columns">
            <div class="chart-container">
                <div class="chart-title">📝 Активность коммитов (последние 30 дней)</div>
                <canvas id="commitsChart"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">⏱️ Время Code Review (часы)</div>
                <canvas id="reviewTimeChart"></canvas>
            </div>
        </div>
        
        <div class="two-columns">
            <div class="chart-container">
                <div class="chart-title">🚀 Релизы по месяцам</div>
                <canvas id="releasesChart"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">💰 Технический долг</div>
                <canvas id="debtChart"></canvas>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">👥 Топ контрибьюторы</div>
            <canvas id="contributorsChart"></canvas>
        </div>
    </div>
    
    <script>
        let metricsData = null;
        
        // Загрузка данных
        async function loadMetrics() {
            try {
                const response = await fetch('data/dashboard_data.json');
                metricsData = await response.json();
                updateDashboard();
            } catch (error) {
                console.error('Ошибка загрузки метрик:', error);
                document.getElementById('lastUpdate').innerHTML = '❌ Ошибка загрузки данных';
            }
        }
        
        // Обновление дашборда
        function updateDashboard() {
            if (!metricsData) return;
            
            // Обновляем время
            const timestamp = new Date(metricsData.timestamp);
            document.getElementById('lastUpdate').innerHTML = 
                `Последнее обновление: ${timestamp.toLocaleString('ru-RU')}`;
            
            // Ключевые метрики
            const keyMetrics = [
                { title: 'Коммитов (90 дней)', value: metricsData.commits.total_commits_90d, icon: '📝' },
                { title: 'Среднее время ревью', value: `${metricsData.code_review.avg_review_time_hours} ч`, icon: '⏱️' },
                { title: 'Всего релизов', value: metricsData.releases.total_releases, icon: '🚀' },
                { title: 'PR Merge Rate', value: `${metricsData.pull_requests.merge_rate}%`, icon: '🔄' },
                { title: 'Открытых долгов', value: metricsData.technical_debt.open_debt_issues, icon: '💰' },
                { title: 'Активных контрибьюторов', value: metricsData.contributors.active_contributors_90d, icon: '👥' }
            ];
            
            const metricsGrid = document.getElementById('keyMetrics');
            metricsGrid.innerHTML = keyMetrics.map(metric => `
                <div class="metric-card">
                    <div class="metric-title">${metric.icon} ${metric.title}</div>
                    <div class="metric-value">${metric.value}</div>
                </div>
            `).join('');
            
            // График коммитов
            if (metricsData.commits.daily) {
                const commitsData = Object.entries(metricsData.commits.daily)
                    .slice(-30)
                    .map(([date, count]) => ({ date, count }));
                
                new Chart(document.getElementById('commitsChart'), {
                    type: 'line',
                    data: {
                        labels: commitsData.map(d => moment(d.date).format('DD.MM')),
                        datasets: [{
                            label: 'Коммиты',
                            data: commitsData.map(d => d.count),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { position: 'top' }
                        }
                    }
                });
            }
            
            // График времени ревью
            new Chart(document.getElementById('reviewTimeChart'), {
                type: 'bar',
                data: {
                    labels: ['Среднее время', 'Медианное время'],
                    datasets: [{
                        label: 'Часы',
                        data: [
                            metricsData.code_review.avg_review_time_hours,
                            metricsData.code_review.median_review_time_hours
                        ],
                        backgroundColor: ['#10b981', '#3b82f6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
            
            // График релизов
            if (metricsData.releases.release_dates) {
                const releasesByMonth = {};
                metricsData.releases.release_dates.forEach(date => {
                    const month = moment(date).format('MMM YYYY');
                    releasesByMonth[month] = (releasesByMonth[month] || 0) + 1;
                });
                
                new Chart(document.getElementById('releasesChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(releasesByMonth),
                        datasets: [{
                            label: 'Релизы',
                            data: Object.values(releasesByMonth),
                            backgroundColor: '#f59e0b'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true
                    }
                });
            }
            
            // График технического долга
            new Chart(document.getElementById('debtChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Открытые долги', 'Старые PR (>30 дней)', 'TODO в коде'],
                    datasets: [{
                        data: [
                            metricsData.technical_debt.open_debt_issues,
                            metricsData.technical_debt.old_prs_count,
                            metricsData.technical_debt.todos_count
                        ],
                        backgroundColor: ['#ef4444', '#f59e0b', '#8b5cf6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
            
            // Топ контрибьюторы
            if (metricsData.contributors.top_contributors) {
                new Chart(document.getElementById('contributorsChart'), {
                    type: 'bar',
                    data: {
                        labels: metricsData.contributors.top_contributors.map(c => c.name),
                        datasets: [{
                            label: 'Коммиты',
                            data: metricsData.contributors.top_contributors.map(c => c.commits),
                            backgroundColor: '#10b981'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        indexAxis: 'y'
                    }
                });
            }
        }
        
        // Загружаем метрики при загрузке страницы
        loadMetrics();
        // Обновляем каждые 5 минут
        setInterval(loadMetrics, 300000);
    </script>
</body>
</html>
