name: Metrics Collector

on:
  schedule:
    - cron: '0 0 * * *'  # Каждый день в 00:00 UTC
  workflow_dispatch:      # Ручной запуск
  push:
    branches: [main, master]  # Запуск при пуше в main

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Важно для деплоя на gh-pages
      pull-requests: read
      issues: read
      actions: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pygithub pandas python-dateutil requests
          
      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python scripts/metrics_collector.py
          
      - name: Upload metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-data
          path: metrics/
          
      # 👇 ВОТ СЮДА ДОБАВЬТЕ ЭТОТ БЛОК 👇
      - name: Deploy Dashboard
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4  # Используйте v4, не v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update metrics dashboard'
