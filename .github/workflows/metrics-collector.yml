name: Metrics Collector

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Важно для push в репозиторий
      pull-requests: read
      issues: read
      actions: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pygithub pandas python-dateutil requests
          
      - name: Collect metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python scripts/metrics_collector.py
          
      - name: Upload metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-data
          path: metrics/
          
      # 👇 НОВЫЙ ШАГ: Сохраняем данные в репозиторий
      - name: Commit and push metrics data
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ metrics/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update metrics data [skip ci]"
          git push
